name: Deploy to EC2

# Trigger: runs every time you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest   # GitHub provides this free Linux runner

    steps:

      # ─────────────────────────────────────────
      # STEP 1: Check out your code
      # ─────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        # Downloads your repo code onto the GitHub runner

      # ─────────────────────────────────────────
      # STEP 2: Build and push Docker image
      # ─────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # Logs into Docker Hub so you can push your image there

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          # Tags the image with your Docker Hub username and repo
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudwatch-app:latest

      # ─────────────────────────────────────────
      # STEP 3: SSH into EC2 and deploy
      # ─────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        # We define the secrets here so the script can use them safely
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SMTP_EMAIL,SMTP_PASSWORD  # Pass the env variables into the script
          # These commands run on your EC2 server
          script: |
            # Go to the project folder
            cd /home/ubuntu/cloudwatch-stack/monitoring

            # Dynamically create the .env file
            # Note: We use > to create the file, and >> to add the second line
            echo "SMTP_EMAIL=$SMTP_EMAIL" > .env
            echo "SMTP_PASSWORD=$SMTP_PASSWORD" >> .env

            # Pull the latest image you just pushed to Docker Hub
            docker compose pull

            # Restart containers with the new image
            # -d means detached (runs in background)
            docker compose up -d

            # Remove old unused images to save disk space
            docker image prune -f

            # Show running containers so you can see in the logs
            docker compose ps