global:
  scrape_interval: 15s       # collect metrics every 15 seconds
  evaluation_interval: 15s   # evaluate alert rules every 15 seconds

scrape_configs:

  # Scrape Prometheus itself
  # Prometheus exposes its own metrics — useful to monitor the monitor
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape cAdvisor — Docker container metrics
  # CPU, memory, network, disk per container
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          group: "infrastructure"

  # Scrape your Node.js app — application metrics
  # Request count, response time, active requests
  - job_name: "cloudwatch-app"
    static_configs:
      - targets: ["app:3001"]
        labels:
          group: "application"
    metrics_path: /metrics   # the endpoint your app exposes